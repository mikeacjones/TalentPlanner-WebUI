<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBC Classic Talent Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="planner-shell" id="planner-shell">
    <div class="selection-screen" id="selection-screen" hidden>
      <div class="selection-card">
        <p class="selection-kicker">Talent Planner</p>
        <h1>Choose Your Era And Class</h1>
        <p class="selection-copy">Start with a ruleset, then pick a class to open its talent trees.</p>
        <div class="selection-section">
          <div class="selection-label">Era</div>
          <div class="selection-flavors" id="selection-flavors"></div>
        </div>
        <div class="selection-section">
          <div class="selection-label">Class</div>
          <div class="selection-classes" id="selection-classes"></div>
        </div>
      </div>
    </div>

    <div class="planner" id="planner">
      <div class="flavor-toggle" id="flavor-toggle"></div>
      <div class="class-picker" id="class-picker"></div>

      <div class="top-bar">
        <div class="top-bar-left">
          <span class="top-bar-label">Points Remaining:</span>
          <span class="points-badge" id="points-left">61</span>
        </div>
        <div class="top-bar-center">
          <span class="top-bar-label">Required Level:</span>
          <span class="level-badge" id="req-level">9</span>
        </div>
        <div class="top-bar-right">
          <a
            id="btn-addon"
            class="btn btn-addon"
            href="https://www.curseforge.com/wow/addons/talent-sequence-2"
            target="_blank"
            rel="noopener noreferrer"
          >
            In-Game Addon
          </a>
          <button id="btn-reset" class="btn btn-reset">Reset</button>
          <button id="btn-link" class="btn btn-reset">Copy Link</button>
          <button id="btn-export" class="btn btn-primary">Export JSON</button>
        </div>
      </div>

      <div class="mobile-tree-switcher" id="mobile-tree-switcher"></div>

      <div class="trees-container" id="trees-container">
        <!-- Trees rendered by JS -->
      </div>

      <div class="order-panel" id="order-panel">
        <div class="order-panel-header">
          <h2>Talent Order</h2>
          <button class="order-panel-toggle" id="order-panel-toggle" type="button" aria-expanded="true">
            Collapse
          </button>
        </div>
        <div class="order-grid" id="order-list"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="export-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>Exported Talent Sequence</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <textarea id="export-output" readonly rows="20"></textarea>
      <button class="btn btn-primary" id="btn-copy">Copy to Clipboard</button>
    </div>
  </div>

  <script src="planner.js"></script>
</body>
</html>
